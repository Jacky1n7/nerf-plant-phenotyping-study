[project]
name = "nerf-plant-phenotyping-study"
default_dataset = "maize_plant_01"

[paths]
data_raw_dir = "data/raw"
data_processed_dir = "data/processed"
outputs_dir = "outputs"
runs_dir = "outputs/runs"
instant_ngp_dir = "third_party/instant-ngp"
pointnerf_dir = "third_party/pointnerf"
python_bin = "python"

[pipeline]
default_stages = [
  "prepare_dirs",
  "extract_video_frames",
  "colmap",
  "colmap_to_text",
  "transforms",
  "train_instant_ngp",
  "export_geometry",
  "extract_traits",
]

[stages.prepare_dirs]
enabled = true
commands = [
  "mkdir -p {video_dir}",
  "mkdir -p {workspace_dir}",
  "mkdir -p {run_dir}",
  "mkdir -p {outputs_dataset_dir}",
]

[stages.extract_video_frames]
enabled = true
required_tools = ["ffmpeg"]
commands = [
  "{python_bin} scripts/extract_video_frames.py --video-dir {video_dir} --input-video {video_input} --output-dir {images_dir} --fps {frame_fps} --start-time {video_start_time} --end-time {video_end_time} --max-frames {frame_max_count} --jpeg-quality {jpeg_quality} --resize-width {resize_width} --resize-height {resize_height} --filename-prefix {frame_prefix} --start-number {frame_start_number} --overwrite {overwrite_frames}",
]

[stages.colmap]
enabled = true
required_tools = ["colmap"]
commands = [
  "rm -rf {workspace_dir}/colmap {workspace_dir}/colmap_text {workspace_dir}/transforms.json",
  "mkdir -p {workspace_dir}/colmap",
  "OPENBLAS_NUM_THREADS={openblas_num_threads} colmap automatic_reconstructor --workspace_path {workspace_dir}/colmap --image_path {images_dir} --data_type {colmap_data_type} --quality {colmap_quality} --single_camera {colmap_single_camera} --use_gpu {colmap_use_gpu} --gpu_index {colmap_gpu_index} --num_threads {colmap_num_threads} --dense 0",
]

[stages.colmap_to_text]
enabled = true
required_tools = ["colmap"]
commands = [
  "mkdir -p {workspace_dir}/colmap_text",
  "colmap model_converter --input_path {workspace_dir}/colmap/sparse/0 --output_path {workspace_dir}/colmap_text --output_type TXT",
]

[stages.transforms]
enabled = true
commands = [
  "{python_bin} {instant_ngp_dir}/scripts/colmap2nerf.py --images {images_dir} --text {workspace_dir}/colmap_text --out {workspace_dir}/transforms.json --aabb_scale {aabb_scale} {keep_colmap_coords_flag}",
  "{python_bin} scripts/fix_transforms_paths.py --transforms {workspace_dir}/transforms.json --project-root {project_root}",
]

[stages.train_instant_ngp]
enabled = true
commands = [
  "{python_bin} {instant_ngp_dir}/scripts/run.py --scene {workspace_dir} --mode nerf --n_steps {ngp_steps} --save_snapshot {outputs_dataset_dir}/instant-ngp.msgpack",
]

[stages.export_geometry]
enabled = true
commands = [
  "{python_bin} {instant_ngp_dir}/scripts/run.py --scene {workspace_dir} --mode nerf --load_snapshot {outputs_dataset_dir}/instant-ngp.msgpack --save_mesh {outputs_dataset_dir}/mesh.ply --marching_cubes_res {marching_cubes_res}",
]

[stages.extract_traits]
enabled = true
commands = [
  "{python_bin} scripts/extract_traits.py --input {outputs_dataset_dir}/mesh.ply --output {outputs_dataset_dir}/traits.csv --vertical-axis {vertical_axis}",
]
