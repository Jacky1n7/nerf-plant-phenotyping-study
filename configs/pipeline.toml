[project]
name = "nerf-plant-phenotyping-study"
default_dataset = "maize_plant_01"

[paths]
data_raw_dir = "data/raw"
data_processed_dir = "data/processed"
outputs_dir = "outputs"
runs_dir = "outputs/runs"
instant_ngp_dir = "third_party/instant-ngp"
pointnerf_dir = "third_party/pointnerf"
python_bin = "python"

[pipeline]
default_stages = [
  "prepare_dirs",
  "extract_video_frames",
  "crop_images",
  "filter_frames",
  "dehaze_images",
  "colmap",
  "colmap_to_text",
  "transforms",
  "train_instant_ngp",
  "export_geometry",
  "extract_dense_point_cloud",
  "extract_traits",
  "archive_results",
]

[stages.prepare_dirs]
enabled = true
commands = [
  "mkdir -p {video_dir}",
  "mkdir -p {workspace_dir}",
  "mkdir -p {run_dir}",
  "mkdir -p {outputs_dataset_dir}",
]

[stages.extract_video_frames]
enabled = true
required_tools = ["ffmpeg"]
commands = [
  "{python_bin} scripts/extract_video_frames.py --video-dir {video_dir} --input-video {video_input} --output-dir {images_dir} --fps {frame_fps} --start-time {video_start_time} --end-time {video_end_time} --max-frames {frame_max_count} --jpeg-quality {jpeg_quality} --resize-width {resize_width} --resize-height {resize_height} --filename-prefix {frame_prefix} --start-number {frame_start_number} --overwrite {overwrite_frames}",
]

[stages.crop_images]
enabled = true
commands = [
  "{python_bin} scripts/crop_images.py --input-dir {images_dir} --output-dir {cropped_images_dir} --enabled {crop_enabled} --overwrite {crop_overwrite} --x-min-ratio {crop_x_min_ratio} --x-max-ratio {crop_x_max_ratio} --y-min-ratio {crop_y_min_ratio} --y-max-ratio {crop_y_max_ratio} --mask-right-ratio {crop_mask_right_ratio} --mask-bottom-ratio {crop_mask_bottom_ratio}",
]

[stages.filter_frames]
enabled = true
commands = [
  "{python_bin} scripts/filter_blurry_frames.py --input-dir {frame_filter_input_dir} --output-dir {filtered_images_dir} --metrics-csv {workspace_dir}/frame_filter_metrics.csv --enabled {frame_filter_enabled} --overwrite {frame_filter_overwrite} --min-sharpness {frame_filter_min_sharpness} --min-images {frame_filter_min_images} --min-index {frame_filter_min_index} --max-index {frame_filter_max_index} --topup-mode {frame_filter_topup_mode}",
]

[stages.dehaze_images]
enabled = true
commands = [
  "{python_bin} scripts/dehaze_images.py --input-dir {dehaze_input_dir} --output-dir {dehazed_images_dir} --enabled {dehaze_enabled} --overwrite {dehaze_overwrite} --omega {dehaze_omega} --window-size {dehaze_window_size} --min-transmission {dehaze_min_transmission} --atmosphere-top-percent {dehaze_atmosphere_top_percent} --guided-radius {dehaze_guided_radius} --guided-eps {dehaze_guided_eps} --gamma {dehaze_gamma} --jpeg-quality 95",
]

[stages.colmap]
enabled = true
required_tools = ["colmap"]
commands = [
  "rm -rf {workspace_dir}/colmap {workspace_dir}/colmap_text {workspace_dir}/transforms.json",
  "mkdir -p {workspace_dir}/colmap",
  "OPENBLAS_NUM_THREADS={openblas_num_threads} colmap automatic_reconstructor --workspace_path {workspace_dir}/colmap --image_path {recon_images_dir} --data_type {colmap_data_type} --quality {colmap_quality} --single_camera {colmap_single_camera} --use_gpu {colmap_use_gpu} --gpu_index {colmap_gpu_index} --num_threads {colmap_num_threads} --dense 0 {colmap_extra_args}",
]

[stages.colmap_to_text]
enabled = true
required_tools = ["colmap"]
commands = [
  "mkdir -p {workspace_dir}/colmap_text",
  "{python_bin} scripts/select_best_colmap_model.py --sparse-root {workspace_dir}/colmap/sparse --output-path-file {workspace_dir}/colmap_best_model_path.txt",
  "colmap model_converter --input_path $(cat {workspace_dir}/colmap_best_model_path.txt) --output_path {workspace_dir}/colmap_text --output_type TXT",
]

[stages.transforms]
enabled = true
commands = [
  "{python_bin} {instant_ngp_dir}/scripts/colmap2nerf.py --images {recon_images_dir} --text {workspace_dir}/colmap_text --out {workspace_dir}/transforms.json --aabb_scale {aabb_scale} {keep_colmap_coords_flag}",
  "{python_bin} scripts/fix_transforms_paths.py --transforms {workspace_dir}/transforms.json --project-root {project_root}",
]

[stages.train_instant_ngp]
enabled = true
commands = [
  "{python_bin} scripts/train_reconstruction.py --backend {recon_backend} --python-bin {python_bin} --ngp-script {instant_ngp_dir}/scripts/run.py --scene {workspace_dir} --steps {ngp_steps} --snapshot {outputs_dataset_dir}/instant-ngp.msgpack --transforms {workspace_dir}/transforms.json --near-distance {recon_near_distance} --sharpen {recon_sharpen} --exposure {recon_exposure} --train-mode {recon_train_mode} --rfl-warmup-steps {recon_rfl_warmup_steps} --rflrelax-begin-step {recon_rflrelax_begin_step} --rflrelax-end-step {recon_rflrelax_end_step} --visualize {training_vis_enabled} --chunk-steps {training_vis_chunk_steps} --screenshot-frame {training_vis_frame_index} --screenshot-spp {training_vis_spp} --width {training_vis_width} --height {training_vis_height} --vis-dir {outputs_dataset_dir}/training_vis --make-video {training_vis_make_video} --video-fps {training_vis_video_fps} --video-output {outputs_dataset_dir}/training_vis/progress.mp4 --mip-train-bin {mip_train_bin} --mip-method {mip_method} --mip-output-dir {mip_output_dir} --mip-config-link {mip_config_link} --mip-extra-args \"{mip_train_extra_args}\"",
]

[stages.export_geometry]
enabled = true
commands = [
  "{python_bin} scripts/export_geometry.py --backend {recon_backend} --python-bin {python_bin} --ngp-script {instant_ngp_dir}/scripts/run.py --scene {workspace_dir} --snapshot {outputs_dataset_dir}/instant-ngp.msgpack --output-mesh {outputs_dataset_dir}/mesh.ply --marching-cubes-res {marching_cubes_res} --marching-cubes-density-thresh {marching_cubes_density_thresh} --mip-export-bin {mip_export_bin} --mip-output-dir {mip_output_dir} --mip-config-link {mip_config_link} --mip-export-method {mip_export_method} --mip-export-dir {mip_export_dir} --mip-extra-args \"{mip_export_extra_args}\"",
]

[stages.extract_dense_point_cloud]
enabled = true
commands = [
  "{python_bin} scripts/extract_dense_point_cloud.py --input {outputs_dataset_dir}/mesh.ply --output {outputs_dataset_dir}/dense_point_cloud.ply --enabled {point_cloud_enabled} --num-points {point_cloud_num_points} --seed {point_cloud_seed}",
]

[stages.extract_traits]
enabled = true
commands = [
  "{python_bin} scripts/extract_traits.py --input {outputs_dataset_dir}/mesh.ply --output {outputs_dataset_dir}/traits.csv --vertical-axis {vertical_axis}",
]

[stages.archive_results]
enabled = true
commands = [
  "{python_bin} scripts/archive_run_results.py --enabled {archive_enabled} --dataset {dataset_name} --project-root {project_root} --outputs-dir {outputs_dataset_dir} --workspace-dir {workspace_dir} --run-log {run_dir}/pipeline.log --archive-root {archive_root_dir} --include-training-vis {archive_include_training_vis} --include-workspace-meta {archive_include_workspace_meta}",
]
