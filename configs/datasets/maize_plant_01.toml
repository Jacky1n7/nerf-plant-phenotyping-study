[dataset]
name = "maize_plant_01"
video_dir = "data/raw/maize_plant_01/video"
video_input = "data/raw/maize_plant_01/video/capture.mp4"
images_dir = "data/raw/maize_plant_01/images"
workspace_dir = "data/processed/maize_plant_01"
outputs_dataset_dir = "outputs/maize_plant_01"
notes = "Template dataset config. Copy this file for new datasets."

[video]
fps = 8
start_time = "00:00:00"
end_time = "none"
max_frames = 180
jpeg_quality = 2
resize_width = -1
resize_height = -1
filename_prefix = "frame"
start_number = 1
overwrite = true

[dehaze]
enabled = true
output_dir = "data/processed/maize_plant_01/images_dehazed"
overwrite = true
omega = 0.95
window_size = 15
min_transmission = 0.1
atmosphere_top_percent = 0.001
guided_radius = 24
guided_eps = 0.001
gamma = 1.0

[colmap]
data_type = "video"
quality = "medium"
single_camera = true
use_gpu = true
gpu_index = -1
num_threads = -1
openblas_num_threads = 1

[reconstruction]
aabb_scale = 16
keep_colmap_coords = true
ngp_steps = 50000
marching_cubes_res = 256
marching_cubes_density_thresh = 2.5
near_distance = -1.0
sharpen = 0.2
exposure = 0.0
train_mode = "rfl_relax"
rfl_warmup_steps = 1500
rflrelax_begin_step = 15000
rflrelax_end_step = 42000
training_vis_enabled = true
training_vis_chunk_steps = 5000
training_vis_frame_index = 0
training_vis_spp = 8
training_vis_width = 1280
training_vis_height = 720
training_vis_make_video = true
training_vis_video_fps = 6

[point_cloud]
enabled = true
num_points = 1200000
seed = 42

[traits]
vertical_axis = "z"
