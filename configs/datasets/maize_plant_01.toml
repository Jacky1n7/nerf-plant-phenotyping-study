[dataset]
name = "maize_plant_01"
video_dir = "data/raw/maize_plant_01/video"
video_input = "data/raw/maize_plant_01/video/capture.mp4"
images_dir = "data/raw/maize_plant_01/images"
workspace_dir = "data/processed/maize_plant_01"
outputs_dataset_dir = "outputs/maize_plant_01"
notes = "Template dataset config. Copy this file for new datasets."

[video]
fps = 3.0
