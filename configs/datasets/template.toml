[dataset]
name = "dataset_name"
video_dir = "data/raw/dataset_name/video"
video_input = "data/raw/dataset_name/video/capture.mp4"
images_dir = "data/raw/dataset_name/images"
workspace_dir = "data/processed/dataset_name"
outputs_dataset_dir = "outputs/dataset_name"
notes = "Replace dataset_name with your real dataset id."

[video]
fps = 3.0
start_time = "00:00:00"
end_time = "none"
max_frames = 0
jpeg_quality = 2
resize_width = -1
resize_height = -1
filename_prefix = "frame"
start_number = 1
overwrite = false

[dehaze]
enabled = true
output_dir = "data/processed/dataset_name/images_dehazed"
overwrite = true
omega = 0.95
window_size = 15
min_transmission = 0.1
atmosphere_top_percent = 0.001
guided_radius = 24
guided_eps = 0.001
gamma = 1.0

[colmap]
data_type = "video"
quality = "medium"
single_camera = true
use_gpu = true
gpu_index = -1
num_threads = -1
openblas_num_threads = 1

[reconstruction]
aabb_scale = 16
keep_colmap_coords = true
ngp_steps = 35000
marching_cubes_res = 512
marching_cubes_density_thresh = 2.5
near_distance = -1.0
sharpen = 0.0
exposure = 0.0
train_mode = "rfl_relax"
rfl_warmup_steps = 1000
rflrelax_begin_step = 15000
rflrelax_end_step = 30000
training_vis_enabled = false
training_vis_chunk_steps = 5000
training_vis_frame_index = 0
training_vis_spp = 8
training_vis_width = 1280
training_vis_height = 720
training_vis_make_video = true
training_vis_video_fps = 6

[point_cloud]
enabled = true
num_points = 1200000
seed = 42

[traits]
vertical_axis = "z"
